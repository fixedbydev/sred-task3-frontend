<div>
    <mat-toolbar class="dialog-content-wrapper mat-accent m-0">
        <span class="dialog-title"> Password</span>
        <span class="betweenSpace"></span>
        <button mat-icon-button (click)="onClose()" aria-label="Close dialog">
            <mat-icon>close</mat-icon>
        </button>
    </mat-toolbar>
    <div class="dialog-xs">
        <form fxLayout="row wrap" [formGroup]="passwordFormGroup">
            <mat-dialog-content class="p-0">
                <div class="p-12" fxLayout="row wrap">
                    <mat-form-field class="margin-l" appearance="outline">
                        <mat-label>Password</mat-label>
                        <input matInput placeholder="Enter Password" type="password" formControlName="password"
                            required minlength="6">
                            <mat-error>
                                @if(passwordFormGroup.get('password')?.hasError('required')) {
                                    Password is required
                                }
                                @if(passwordFormGroup.get('password')?.hasError('minlength')) {
                                    Password must be at least 6 characters
                                }
                            </mat-error>
                    </mat-form-field>
                </div>
            </mat-dialog-content>
            <mat-divider></mat-divider>
            <mat-dialog-actions class="mb-4" fxLayout="row" fxLayoutAlign="end center">
                <button baseDisableButtonDirective mat-raised-button class="mr-8" color="accent"
                    (click)="onClose()">Close</button>

                <button mat-flat-button (click)="onSubmit()">Save</button>
            </mat-dialog-actions>
        </form>
    </div>
</div>
